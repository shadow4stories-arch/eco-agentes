services:
  - type: web
    name: eco-agentes
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: python orquestador.py
    healthCheckPath: /health
    envVars:
      - key: DEEPSEEK_API_KEY
        sync: false
      - key: MODE
        value: live
      - key: CYCLE_MINUTES
        value: 60
      - key: FIVERR_EMAIL
        value: shadow4stories@gmail.com
      - key: FIVERR_SKILLS
        value: python,web scraping,automation,data entry,virtual assistant,web development,chatbot,ia,bot development
      - key: BLOGGER_EMAIL
        value: shadow4stories@gmail.com
      - key: BLOGGER_PASSWORD
        sync: false
      - key: BLOG_TOPIC
        value: automatizacion ia tecnologia
      - key: YOUTUBE_PASSWORD
        sync: false
      - key: YOUTUBE_NICHE
        value: technology automation shorts
      - key: YOUTUBE_REFRESH_TOKEN
        sync: false
      - key: LOCAL_SERVICE
        value: desarrollo web,automatizacion,ia,chatbots,paginas web
      - key: GMAIL_APP_PASSWORD
        sync: false
      - key: SERVICE_PITCH
        value: Shadow Tech - Automatizacion con IA en toda Espana
      - key: PAYPAL_CLIENT_ID
        sync: false
      - key: PAYPAL_CLIENT_SECRET
        sync: false
      - key: ADSTERRA_SITE_ID
        value: 333d081ccb545bd33678a0f641a00be8